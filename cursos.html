Henri Fayol, um dos pioneiros da administração moderna, descreveu quatro funções que até hoje organizam o trabalho de qualquer gestor ou auxiliar administrativo: planejar (definir o que precisa ser feito e como), organizar (distribuir recursos e responsabilidades), dirigir (orientar e liderar pessoas na execução) e controlar (acompanhar resultados e corrigir rotas).

  function tick(){
    const d = new Date();
    document.getElementById('clock').textContent = d.toLocaleString('pt-BR', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit', year:'numeric' });
  }
  tick(); setInterval(tick, 1000*30);

  // ----- Render course cards from COURSES data -----
  const grid = document.getElementById('grid');
  let i = 1;
  for(const id in COURSES){
    const c = COURSES[id];
    const totalPages = c.chapters.reduce((sum, ch) => sum + ch.pages.length, 0);
    const totalChapters = c.chapters.length;

    let savedPage = 0;
    try{
      const raw = localStorage.getItem('wakasa_progress_' + id);
      if(raw) savedPage = JSON.parse(raw).flatIndex || 0;
    }catch(e){}
    const pct = totalPages ? Math.round((savedPage / totalPages) * 100) : 0;

    const a = document.createElement('a');
    a.className = 'course';
    a.href = 'livro.html?c=' + id;
    a.innerHTML = `
      <div class="course-top">
        <span class="tag">${c.tag}</span>
        <span class="arrow">↗</span>
      </div>
      <div>
        <h3>${c.title}</h3>
        <p>${c.subtitle}</p>
      </div>
      <div class="meta">
        <div class="meta-item"><b>${totalChapters}</b><span>Capítulos</span></div>
        <div class="meta-item"><b>${totalPages}</b><span>Páginas</span></div>
        <div class="meta-item"><b>${pct}%</b><span>Concluído</span></div>
      </div>
    `;
    grid.appendChild(a);
    i++;
  }

  // ===== Low-poly animated mesh background =====
  const canvas = document.getElementById('mesh');
  const ctx = canvas.getContext('2d');
  let W, H, points = [];
  const COUNT = 46;
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function initPoints(){
    points = [];
    for(let i=0;i<COUNT;i++){
      points.push({ x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-0.5)*0.15, vy:(Math.random()-0.5)*0.15 });
    }
  }
  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle = 'rgba(200,30,44,0.18)'; ctx.lineWidth = 1;
    for(let i=0;i<points.length;i++){
      for(let j=i+1;j<points.length;j++){
        const d = dist(points[i], points[j]);
        if(d < 160){
          ctx.globalAlpha = 1 - d/160;
          ctx.beginPath(); ctx.moveTo(points[i].x, points[i].y); ctx.lineTo(points[j].x, points[j].y); ctx.stroke();
        }
      }
    }
    ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(200,30,44,0.5)';
    for(const p of points){
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.6, 0, Math.PI*2); ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0 || p.x > W) p.vx *= -1;
      if(p.y < 0 || p.y > H) p.vy *= -1;
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize(); initPoints(); draw();
</script>
</body>
</html>
